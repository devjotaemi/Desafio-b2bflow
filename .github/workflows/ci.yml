name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instala o uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sincroniza dependências (lockfile)
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Formatação (ruff format --check)
        run: uv run ruff format --check .

      - name: Testes (pytest)
        run: uv run pytest -q
